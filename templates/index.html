<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Endee AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .answer {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 5px #aaa;
        }
        .query {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Endee AI Assistant</h1>

    <form action="/ask" method="post">
        <input type="text" name="query" placeholder="Ask me anything..." required>
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
    <div class="answer">
        <p class="query">Question: {{ query }}</p>
        <p>Answer:</p>
        <p>{{ answer|safe }}</p>
    </div>
    {% endif %}

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
